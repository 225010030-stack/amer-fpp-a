<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AMER FPP 账单助手 · 点击菜单</title>
  <style>
    :root { --blue: #2563eb; --bg: #ebebeb; --bot: #fff; --user: #95ec69; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); }
    .wrap { max-width: 480px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; background: #f5f5f5; }
    .header { background: #2e2e2e; color: #fff; padding: 12px 16px; font-size: 15px; font-weight: 600; text-align: center; }
    .chat { flex: 1; padding: 16px 12px 80px; overflow-y: auto; }
    .msg { display: flex; gap: 8px; margin-bottom: 14px; align-items: flex-start; }
    .msg.user { flex-direction: row-reverse; }
    .avatar { width: 36px; height: 36px; border-radius: 4px; background: #4a90d9; color: #fff; font-size: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .msg.user .avatar { background: #7cb342; }
    .bubble { max-width: 85%; background: var(--bot); border-radius: 8px; padding: 10px 12px; font-size: 14px; line-height: 1.5; box-shadow: 0 1px 2px rgba(0,0,0,.06); }
    .msg.user .bubble { background: var(--user); }
    .bubble h4 { margin: 0 0 8px; font-size: 14px; }
    .menu-btn { display: block; width: 100%; text-align: left; border: none; background: transparent; color: var(--blue); padding: 8px 0; cursor: pointer; font-size: 14px; border-bottom: 1px solid #f0f0f0; }
    .menu-btn:last-child { border-bottom: none; }
    .menu-btn:hover { background: #f8fbff; }
    .menu-btn small { display: block; color: #666; font-size: 12px; margin-top: 2px; }
    .footer-links { margin-top: 10px; padding-top: 8px; border-top: 1px solid #eee; display: flex; flex-wrap: wrap; gap: 8px; }
    .footer-links a, .footer-links button.link { background: none; border: none; color: var(--blue); font-size: 13px; cursor: pointer; padding: 0; text-decoration: none; }
    .hint { font-size: 12px; color: #888; margin-top: 6px; }
    .config { padding: 8px 12px; background: #fff; border-bottom: 1px solid #ddd; font-size: 12px; }
    .config input { width: 100%; padding: 6px; margin-top: 4px; border: 1px solid #ccc; border-radius: 4px; }
    .loading { opacity: .6; pointer-events: none; }
    pre { white-space: pre-wrap; font-size: 12px; background: #fafafa; padding: 8px; border-radius: 6px; margin: 8px 0 0; }
    .ok { color: #166534; }
    .err { color: #b91c1c; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="header">AMER FPP 账单助手</div>
  <div class="config">
    Backend: <input id="backend" value="http://127.0.0.1:18082" />
    Root: <input id="root" value="/data/workspace/amer-fpp-a" />
  </div>
  <div class="chat" id="chat"></div>
</div>
<script>
const chat = document.getElementById('chat');
let menuData = null;

function backend() { return document.getElementById('backend').value.replace(/\/$/, ''); }
function root() { return document.getElementById('root').value.trim(); }

function addMsg(html, isUser = false) {
  const div = document.createElement('div');
  div.className = 'msg' + (isUser ? ' user' : '');
  div.innerHTML = `
    <div class="avatar">${isUser ? '我' : 'FPP'}</div>
    <div class="bubble">${html}</div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function footerHtml() {
  if (!menuData) return '';
  return '<div class="footer-links">' + menuData.footer_links.map(f => {
    if (f.href) return `<a href="${f.href}">${f.label}</a>`;
    if (f.action === 'show_menu') return `<button type="button" class="link" data-action="show_menu">${f.label}</button>`;
    if (f.action) return `<button type="button" class="link" data-run="${f.action}">${f.label}</button>`;
    return `<button type="button" class="link" data-text="${f.text || f.label}">${f.label}</button>`;
  }).join('') + '</div>';
}

function showMenu() {
  if (!menuData) return;
  let html = `<h4>${menuData.title}</h4><p>${menuData.welcome}</p>`;
  html += `<p class="hint">推荐顺序：${menuData.recommended_order}</p>`;
  menuData.items.forEach(it => {
    html += `<button type="button" class="menu-btn" data-run="${it.action}" data-label="${it.label}">
      ${it.id}- ${it.label}<small>${it.subtitle} · 需要：${it.files}</small>
    </button>`;
  });
  html += footerHtml();
  const el = addMsg(html);
  bindButtons(el);
}

async function runAction(action, label) {
  addMsg(`执行：${label || action}`, true);
  const bubble = addMsg('处理中…');
  bubble.classList.add('loading');
  try {
    const res = await fetch(`${backend()}/api/run`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action, root: root() }),
    });
    const data = await res.json();
    const ok = data.ok;
    const out = (data.stdout_tail || []).join('\n') || JSON.stringify(data, null, 2);
    const paths = (data.outputs || []).concat((out.match(/DONE: .+/g) || []));
    bubble.querySelector('.bubble').innerHTML = `
      <div class="${ok ? 'ok' : 'err'}">${ok ? '✅ 成功' : '❌ 失败'} · ${action}</div>
      ${paths.length ? '<p><b>输出文件：</b><br>' + paths.map(p => p.replace(/^DONE: /,'')).join('<br>') + '</p>' : ''}
      <pre>${out.slice(0, 2000)}</pre>
      ${footerHtml()}`;
    bindButtons(bubble);
  } catch (e) {
    bubble.querySelector('.bubble').innerHTML = `<div class="err">请求失败：${e.message}</div>${footerHtml()}`;
    bindButtons(bubble);
  }
  bubble.classList.remove('loading');
}

function bindButtons(container) {
  container.querySelectorAll('[data-run]').forEach(btn => {
    btn.onclick = () => runAction(btn.dataset.run, btn.dataset.label || btn.textContent.trim());
  });
  container.querySelectorAll('[data-action="show_menu"]').forEach(btn => {
    btn.onclick = showMenu;
  });
  container.querySelectorAll('[data-text]').forEach(btn => {
    btn.onclick = () => addMsg(btn.dataset.text, true);
  });
}

async function init() {
  try {
    const res = await fetch(`${backend()}/api/menu`);
    menuData = await res.json();
  } catch (e) {
    addMsg('无法加载菜单，请检查 Backend 地址。');
    return;
  }
  showMenu();
}

init();
</script>
</body>
</html>
