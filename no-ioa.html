  <style>
    .lite-warning {
      margin: 10px 0 14px;
      padding: 12px 14px;
      border: 1px solid #bfdbfe;
      background: #eff6ff;
      color: #1e3a8a;
      border-radius: 12px;
      font-size: 12px;
      line-height: 1.6;
    }
    .panel-section,
    .sub-view,
    .lite-view {
      display: none;
    }
    .panel-section.active,
    .sub-view.active,
    .lite-view.active {
      display: block;
    }
    .sub-tabs,
    .tools-switch-tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin: 0 0 14px;
    }
    .sub-tab,
    .tools-switch-tab {
      border: 1px solid #cbd5e1;
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 12px;
      cursor: pointer;
      background: #fff;
      color: #0f172a;
      font-weight: 600;
    }
    .sub-tab.active,
    .tools-switch-tab.active {
      background: #2563eb;
      color: #fff;
      border-color: #2563eb;
    }
    .lite-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 12px;
    }
    .lite-kpis {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin: 0 0 14px;
    }
    .lite-kpi {
      background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
      border: 1px solid #dbeafe;
      border-radius: 14px;
      padding: 12px 14px;
      box-shadow: 0 4px 14px rgba(15, 23, 42, 0.05);
    }
    .lite-kpi .k {
      font-size: 12px;
      color: #64748b;
      letter-spacing: .01em;
    }
    .lite-kpi .v {
      margin-top: 6px;
      font-weight: 800;
      color: #0f172a;
      font-size: 22px;
    }
    .lite-card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      padding: 14px 16px;
      box-shadow: 0 2px 10px rgba(15, 23, 42, 0.04);
    }
    .lite-card h4 {
      margin: 0 0 6px;
      font-size: 14px;
    }
    .lite-card p {
      margin: 0;
      color: #475569;
      font-size: 12px;
      line-height: 1.6;
    }
    .lite-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      background: #fff;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid #e2e8f0;
    }
    .lite-table th, .lite-table td {
      padding: 9px 10px;
      border-bottom: 1px solid #f1f5f9;
      text-align: left;
    }
    .lite-table th {
      background: #f8fafc;
      color: #334155;
      font-weight: 700;
    }
    .lite-actions {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .lite-actions .btn.btn-sm {
      border-radius: 10px;
      border-color: #cbd5e1;
      background: #fff;
    }
    .lite-log {
      margin-top: 10px;
      min-height: 42px;
      border: 1px dashed #cbd5e1;
      border-radius: 10px;
      padding: 10px 12px;
      background: #f8fafc;
      font-size: 12px;
      color: #334155;
      white-space: pre-wrap;
    }
    .lite-form-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }
    .lite-form-row input,
    .lite-form-row select,
    .lite-form-row textarea {
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      padding: 7px 10px;
      font-size: 12px;
      background: #fff;
    }
    .lite-list {
      margin-top: 10px;
      display: grid;
      gap: 8px;
    }
    .lite-item {
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 10px 12px;
      background: #fff;
    }
    .tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 11px;
      border: 1px solid #dbeafe;
      background: #eff6ff;
      color: #1e40af;
      margin-right: 6px;
    }
    .link-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 10px;
      margin-top: 10px;
    }
    .link-item {
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      background: #fff;
      padding: 10px 12px;
    }
    .link-item .k {
      font-size: 11px;
      color: #64748b;
      margin-bottom: 4px;
    }
    .link-item a {
      font-size: 12px;
      color: #1d4ed8;
      word-break: break-all;
      text-decoration: none;
    }
    .noioa-badge {
      margin-left: 8px;
      font-size: 10px;
      color: #0369a1;
      background: #e0f2fe;
      border: 1px solid #7dd3fc;
      border-radius: 999px;
      padding: 1px 8px;
      font-weight: 700;
    }
    .kgf-kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin: 10px 0 14px;
    }
    .kgf-kpi-card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      padding: 12px 14px;
      box-shadow: 0 2px 10px rgba(15, 23, 42, 0.05);
    }
    .kgf-kpi-card .k {
      font-size: 12px;
      color: #64748b;
    }
    .kgf-kpi-card .v {
      margin-top: 5px;
      font-size: 36px;
      font-weight: 800;
      line-height: 1;
      color: #0f172a;
    }
    .kgf-three-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 12px;
    }
    .kgf-source-card {
      border-radius: 12px;
      padding: 12px;
      background: #fff;
      border: 1px solid #e2e8f0;
      min-height: 98px;
    }
    .kgf-source-card.bot {
      border-top: 3px solid #818cf8;
    }
    .kgf-source-card.ex {
      border-top: 3px solid #f87171;
    }
    .kgf-source-card.pm {
      border-top: 3px solid #60a5fa;
    }
    .kgf-main-grid {
      display: grid;
      grid-template-columns: 1.05fr 1.35fr;
      gap: 12px;
    }
    .kgf-step {
      display: flex;
      gap: 8px;
      align-items: flex-start;
      margin-bottom: 10px;
      font-size: 12px;
    }
    .kgf-step-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      margin-top: 4px;
      flex: 0 0 auto;
    }
    .kgf-queue-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }
    .kgf-queue-card {
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 10px;
      background: #fff;
    }
    .kgf-bar {
      margin-top: 8px;
      height: 6px;
      border-radius: 999px;
      background: #e2e8f0;
      overflow: hidden;
    }
    .kgf-bar > span {
      display: block;
      height: 100%;
      border-radius: 999px;
    }
    .bot-panel {
      margin-top: 14px;
      border: 1px solid #c7d2fe;
      border-radius: 14px;
      background: linear-gradient(180deg, #ffffff 0%, #eef2ff 100%);
      padding: 12px;
    }
    .bot-row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .bot-row input {
      flex: 1;
      min-width: 260px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 13px;
    }
    .bot-log {
      margin-top: 10px;
      border: 1px dashed #cbd5e1;
      border-radius: 10px;
      padding: 10px 12px;
      background: #fff;
      white-space: pre-wrap;
      font-size: 12px;
      color: #334155;
      min-height: 54px;
    }
    .sub-rail.console-tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      padding: 10px 0 8px;
      margin-top: 0;
      border-top: 1px solid #e2e8f0;
      border-bottom: 1px solid #e2e8f0;
      background: #fff;
    }
    .console-main-inner {
      max-width: 1400px;
      margin: 0 auto;
      padding-top: 14px;
    }
    .console-page-head {
      margin-bottom: 12px;
      align-items: flex-end;
    }
    .ssc-page-sub {
      margin-top: 4px;
      color: #64748b;
      font-size: 12px;
      letter-spacing: .06em;
      text-transform: uppercase;
    }
    .panel {
      border-radius: 14px;
      border: 1px solid #e2e8f0;
      box-shadow: 0 2px 12px rgba(15, 23, 42, 0.04);
    }
    .panel-head h3 {
      font-size: 16px;
      letter-spacing: .01em;
    }
    .admin-page-hero {
      border: 1px solid #dbeafe;
      border-radius: 14px;
      background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
      padding: 14px 16px;
      box-shadow: 0 3px 12px rgba(37, 99, 235, 0.08);
    }
    .issue-hero-actions .btn,
    .meeting-hero .btn {
      border-radius: 10px;
    }
    .project-stack .panel {
      margin-bottom: 10px;
      transition: transform .15s ease, box-shadow .15s ease;
    }
    .project-stack .panel:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 22px rgba(15, 23, 42, 0.08);
    }
    .issue-table th {
      background: #f1f5f9;
      color: #334155;
      font-weight: 700;
      font-size: 12px;
    }
    .issue-table td {
      font-size: 12px;
      vertical-align: middle;
      border-bottom: 1px solid #eef2f7;
    }
    .issue-table tr:hover td {
      background: #fbfdff;
    }
    @media (max-width: 980px) {
      .console-main-inner {
        padding-top: 8px;
      }
      .sub-rail {
        padding-top: 8px;
      }
      .admin-page-hero {
        padding: 12px;
      }
      .kgf-three-grid,
      .kgf-main-grid,
      .kgf-queue-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

    function nowText() {
      const d = new Date();
      const p = (n) => String(n).padStart(2, "0");
      return `${d.getFullYear()}-${p(d.getMonth() + 1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
    }
    function esc(s) {
      return String(s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }
    function addAudit(action, detail) {
      state.audit.unshift({ ts: nowText(), action, detail });

    function fileName(id) {
      const f = document.getElementById(id)?.files?.[0];

    }
    function csvDownload(filename, header, rows) {
      const content = [header.join(","), ...rows.map((r) => r.join(","))].join("\n");
      const blob = new Blob([content], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
    }
    function openLink(url) {
      window.open(url, "_blank", "noopener");
    }
    function parseMeetingDraft(text) {
      const lines = String(text || "").split(/\r?\n/).map((l) => l.trim()).filter(Boolean);
      if (!lines.length) return null;
      const topic = lines[0].replace(/^#+\s*/, "").replace(/^主题[:：]\s*/, "") || "未命名会议";
      const todos = lines
        .slice(1)
        .filter((l) => /待办|todo|action|^\-|\*/i.test(l))
        .map((l) => l.replace(/^[-*]\s*/, ""));
      return { topic, todos: todos.length ? todos : ["待补充行动项"] };
    }
    async function runBotQuery(text) {
      const q = String(text || "").trim();
      if (!q) return "请输入问题";
      try {
        const res = await fetch(KNOT_LINKS.orchestrateApi, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text: q })
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        const msg = data?.message || data?.summary || JSON.stringify(data);
        return `[在线 Bot]\n${msg}`;
      } catch {
        return `[本地兜底]\n已记录你的问题：“${q}”\n建议下一步：\n1) 在系统管理中确认待审权限与日志\n2) 在协同模块检查项目里程碑和 Issue`;
      }
    }

        <div class="panel">
          <div class="panel-head"><h3>权限矩阵（示例）</h3></div>
          <table class="admin-audit-table"><thead><tr><th>模块</th><th>Viewer</th><th>Operator</th><th>Admin</th></tr></thead><tbody><tr><td>P1 区域工具</td><td>R</td><td>W</td><td>SA</td></tr><tr><td>P2 知识库</td><td>R</td><td>W</td><td>SA</td></tr><tr><td>P4 协同</td><td>R</td><td>W</td><td>SA</td></tr><tr><td>P5 系统管理</td><td>-</td><td>R</td><td>SA</td></tr></tbody></table>
        </div>`;

      document.getElementById("sys-audit").innerHTML = `
        <div class="panel">
          <div class="panel-head"><h3>操作日志</h3></div>
          <table class="admin-audit-table"><thead><tr><th>时间</th><th>动作</th><th>详情</th></tr></thead><tbody>${(state.audit.length ? state.audit : [{ ts: nowText(), action: "system.init", detail: "初始化无 IOA 克隆页" }]).map((a) => `<tr><td>${esc(a.ts)}</td><td>${esc(a.action)}</td><td>${esc(a.detail)}</td></tr>`).join("")}</tbody></table>
        </div>`;

      document.getElementById("sys-access").innerHTML = `
        <div class="panel">
          <div class="panel-head"><h3>权限申请</h3></div>
          <div class="lite-form-row">
            <input id="reqName" placeholder="申请人" />
            <select id="reqRole"><option>viewer</option><option>operator</option><option>admin</option></select>
            <input id="reqReason" placeholder="申请理由" style="min-width:260px" />
            <button class="btn btn-sm btn-primary" id="btnAddRequest">提交申请</button>
          </div>
          <table class="admin-audit-table" style="margin-top:10px"><thead><tr><th>时间</th><th>申请人</th><th>目标角色</th><th>理由</th><th>状态</th><th>审批动作</th></tr></thead><tbody>${state.accessRequests.map((r) => `
            <tr>
              <td>${esc(r.ts)}</td>
              <td>${esc(r.name)}</td>
              <td>${esc(r.role)}</td>
              <td>${esc(r.reason)}</td>
              <td>${esc(r.status)}</td>
              <td>
                <button class="btn btn-sm" data-req-approve="${esc(r.id || "")}" ${r.status !== "pending" ? "disabled" : ""}>通过</button>
                <button class="btn btn-sm" data-req-reject="${esc(r.id || "")}" ${r.status !== "pending" ? "disabled" : ""}>驳回</button>
              </td>
            </tr>
          `).join("") || '<tr><td colspan="6">暂无申请</td></tr>'}</tbody></table>
        </div>`;

      document.getElementById("btnAddUser").onclick = () => {
        const name = document.getElementById("newUserName").value.trim();
        if (!name) return;
        state.users.unshift({ id: `U-${String(Date.now()).slice(-4)}`, name, role: document.getElementById("newUserRole").value, staffType: document.getElementById("newUserType").value });
        addAudit("user.create", name);
        saveState();
        renderAll();
      };
      document.querySelectorAll("[data-user-save]").forEach((btn) => {
        btn.onclick = () => {
          const id = btn.dataset.userSave;
          const user = state.users.find((u) => u.id === id);
          if (!user) return;
          const sel = document.querySelector(`[data-user-role="${id}"]`);
          if (!sel) return;
          user.role = sel.value;
          addAudit("user.role_update", `${id} -> ${user.role}`);
          saveState();
          renderAll();
        };
      });
      document.getElementById("btnAddRequest").onclick = () => {
        const name = document.getElementById("reqName").value.trim();
        if (!name) return;
        const req = { id: `AR-${String(Date.now()).slice(-4)}`, ts: nowText(), name, role: document.getElementById("reqRole").value, reason: document.getElementById("reqReason").value.trim() || "未填写", status: "pending" };
        state.accessRequests.unshift(req);
        addAudit("access.request", `${req.name} -> ${req.role}`);
        saveState();
        renderAll();
      };
      document.querySelectorAll("[data-req-approve]").forEach((btn) => {
        btn.onclick = () => {
          const req = state.accessRequests.find((r) => r.id === btn.dataset.reqApprove);
          if (!req || req.status !== "pending") return;
          req.status = "approved";
          state.users.unshift({
            id: `U-${String(Date.now()).slice(-4)}`,
            name: req.name,
            role: req.role,
            staffType: "formal"
          });
          addAudit("access.approve", `${req.name} -> ${req.role}`);
          saveState();
          renderAll();
        };
      });
      document.querySelectorAll("[data-req-reject]").forEach((btn) => {
        btn.onclick = () => {
          const req = state.accessRequests.find((r) => r.id === btn.dataset.reqReject);
          if (!req || req.status !== "pending") return;
          req.status = "rejected";
          addAudit("access.reject", `${req.name} -> ${req.role}`);
          saveState();
          renderAll();
        };
      });
      document.getElementById("btnOpenKnotMain").onclick = () => openLink(KNOT_LINKS.knotMainAgent);
      document.getElementById("btnOpenFppPortal").onclick = () => openLink(KNOT_LINKS.fppPortal);
    }

    function renderAll() {
      renderHome();
      renderKnowledge();
      renderCollab();
      renderSystem();
      initHeaderControls();
    }

    function bindBaseEvents() {
      document.querySelectorAll("#mainPanelRail .panel-rail-btn").forEach((btn) => {
        btn.addEventListener("click", () => switchMainPanel(btn.dataset.panel));
      });
      document.querySelectorAll(".tools-switch-tab").forEach((btn) => btn.addEventListener("click", () => switchToolView(btn.dataset.target)));

      document.querySelectorAll("#panelHome .sub-tab").forEach((btn) => btn.addEventListener("click", () => switchSubView(btn.dataset.sub, "#panelHome")));
      document.querySelectorAll("#panelKnowledge .sub-tab").forEach((btn) => btn.addEventListener("click", () => switchSubView(btn.dataset.sub, "#panelKnowledge")));
      document.querySelectorAll("#panelCollab .sub-tab").forEach((btn) => btn.addEventListener("click", () => switchSubView(btn.dataset.sub, "#panelCollab")));
      document.querySelectorAll("#panelSystem .sub-tab").forEach((btn) => btn.addEventListener("click", () => switchSubView(btn.dataset.sub, "#panelSystem")));

      document.getElementById("usBtnAlloc").addEventListener("click", () => {
        const period = document.getElementById("usPeriod").value || "未填写";
        document.getElementById("usLog").textContent = `[${nowText()}] US 自动分摊示例执行\n账单月: ${period}\n台账: ${fileName("usLedger")}\nP1人数: ${fileName("usP1")}`;
      });
      document.getElementById("usBtnSubmit").addEventListener("click", () => {
        document.getElementById("usLog").textContent = `[${nowText()}] US 提单文本示例执行\n提单文件: ${fileName("usSubmission")}`;
      });
      document.getElementById("usDownloadSample").addEventListener("click", () => {
        csvDownload("US_allocation_sample.csv", ["vendor", "period", "amount_usd", "cost_center", "status"], [["Vendor_A", "202607", "12400.00", "CC-1001", "ready"], ["Vendor_B", "202607", "8600.00", "CC-1002", "ready"]]);
      });
      document.getElementById("caBtnAlloc").addEventListener("click", () => {
        const period = document.getElementById("caPeriod").value || "未填写";
        document.getElementById("caLog").textContent = `[${nowText()}] CAN 自动分摊示例执行\n账单月: ${period}\n台账: ${fileName("caLedger")}\nP1人数: ${fileName("caP1")}`;
      });
      document.getElementById("caBtnSubmit").addEventListener("click", () => {
        document.getElementById("caLog").textContent = `[${nowText()}] CAN 提单文本示例执行\n提单文件: ${fileName("caSubmission")}`;
      });
      document.getElementById("caDownloadSample").addEventListener("click", () => {
        csvDownload("CAN_allocation_sample.csv", ["vendor", "period", "amount_cad", "cost_center", "status"], [["Vendor_CA_1", "202607", "5300.00", "CA-CC-01", "ready"], ["Vendor_CA_2", "202607", "4875.00", "CA-CC-07", "ready"]]);
      });
      document.getElementById("sgBtnRun").addEventListener("click", () => {
        document.getElementById("sgLog").textContent = `[${nowText()}] SG EE Listing 摘要示例执行\nActive: ${fileName("sgActive")}\nTerminated: ${fileName("sgTerminated")}\n上月EE: ${fileName("sgLastEe")}`;
      });
      document.getElementById("sgDownloadTemplate").addEventListener("click", () => {
        const text = "SG EE Listing 模板说明\n1) 上传 Active/Terminated/Last Month\n2) 字段建议: employee_id, legal_name, cost_center\n3) 输出标签: 新增/离职/冲突/缺失";
        const blob = new Blob([text], { type: "text/plain;charset=utf-8;" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "SG_eelisting_template_note.txt";
        a.click();
        URL.revokeObjectURL(url);
      });
    }

    const topbarDate = document.getElementById("topbarDate");
    if (topbarDate) {
      topbarDate.textContent = nowText();
      setInterval(() => { topbarDate.textContent = nowText(); }, 60000);
    }
    bindBaseEvents();
    renderAll();
    renderGlobalSubRail("tools");
  </script>
</body>
</html>
