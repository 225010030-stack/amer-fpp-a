name: amer-fpp-ai

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: amer-fpp-ai-backend
    environment:
      - WORKSPACE_ROOT=/app
    volumes:
      - ./:/app
    ports:
      - "18082:18082"
    restart: unless-stopped

  web:
    image: python:3.11-slim
    container_name: amer-fpp-ai-web
    working_dir: /app
    command: python -m http.server 18081 --directory web-tool
    volumes:
      - ./:/app:ro
    ports:
      - "18081:18081"
    depends_on:
      - backend
    restart: unless-stopped
